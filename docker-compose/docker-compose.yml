# ─── SPIFFE/SPIRE Standalone Demo ─────────────────────────────────────────
# Everything you need to learn SPIFFE/SPIRE on a single machine.
# Requirements: Docker Desktop only.
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Watch logs
#   docker compose down -v        # Stop and clean up

networks:
  spiffe-net:
    driver: bridge

volumes:
  spire-data:   # SPIRE Server's SQLite database + CA keys
  spire-sockets: # SPIRE Agent's Workload API Unix socket
  spire-tokens:  # Join token passed from init to agent
  server-api-socket: # SPIRE Server's API socket (shared with init)

services:

  # ─── SPIRE Server ──────────────────────────────────────────────────────
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    hostname: spire-server
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    volumes:
      - ./spire/server.conf:/opt/spire/conf/server/server.conf:ro
      - spire-data:/opt/spire/data
      - server-api-socket:/tmp/spire-server/private
    ports:
      - "8081:8081"   # gRPC API (agents connect here)
      - "8080:8080"   # Health check
    networks:
      - spiffe-net
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Join-Token Init ──────────────────────────────────────────────────
  # Generates a join token on the server and writes it to a shared volume
  spire-init:
    build:
      context: ./spire
      dockerfile: Dockerfile.init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        TOKEN=$$(/opt/spire/bin/spire-server token generate \
            -socketPath /tmp/spire-server/private/api.sock \
            -spiffeID spiffe://example.org/agent/docker \
            -ttl 600 \
            -output json | grep -o '"value":"[^"]*"' | cut -d'"' -f4)
        if [ -z "$$TOKEN" ]; then
          echo "ERROR: Failed to generate join token"
          exit 1
        fi
        echo "$$TOKEN" > /opt/spire/tokens/join-token
        echo "Join token generated: $${TOKEN:0:8}..."
    volumes:
      - spire-tokens:/opt/spire/tokens
      - server-api-socket:/tmp/spire-server/private:ro
    networks:
      - spiffe-net
    depends_on:
      spire-server:
        condition: service_healthy
    restart: "no"

  # ─── SPIRE Agent ──────────────────────────────────────────────────────
  # Waits for the join token, then starts the agent
  spire-agent:
    build:
      context: ./spire
      dockerfile: Dockerfile.agent
    hostname: spire-agent
    pid: "host"
    entrypoint: ["/bin/sh", "/opt/spire/conf/agent/agent-entrypoint.sh"]
    volumes:
      - ./spire/agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - ./spire/agent-entrypoint.sh:/opt/spire/conf/agent/agent-entrypoint.sh:ro
      - spire-sockets:/run/spire/sockets   # Shared socket for workloads
      - spire-tokens:/opt/spire/tokens:ro  # Join token from init
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For Docker workload attestor
    networks:
      - spiffe-net
    depends_on:
      spire-server:
        condition: service_healthy
      spire-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/run/spire/sockets/agent.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Registration Bootstrap ──────────────────────────────────────────
  # Creates registration entries for frontend and backend, then exits
  spire-bootstrap:
    build:
      context: ./spire
      dockerfile: Dockerfile.bootstrap
    volumes:
      - ./spire/bootstrap.sh:/bootstrap.sh:ro
      - server-api-socket:/tmp/spire-server/private:ro
    networks:
      - spiffe-net
    depends_on:
      spire-agent:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

  # ─── Frontend Service ──────────────────────────────────────────────
  frontend:
    build:
      context: ./apps
      dockerfile: frontend/Dockerfile
    hostname: frontend
    pid: "host"
    environment:
      SPIFFE_ENDPOINT_SOCKET: "unix:///run/spire/sockets/agent.sock"
      BACKEND_URL: "https://backend:8443"
      TRUST_DOMAIN: "example.org"
      SERVICE_NAME: "frontend"
    volumes:
      - spire-sockets:/run/spire/sockets:ro
    ports:
      - "3000:3000"   # Access from host: curl http://localhost:3000
    networks:
      - spiffe-net
    depends_on:
      spire-agent:
        condition: service_healthy
    labels:
      # Docker workload attestor uses these labels to identify this container
      spiffe.io/service: "frontend"
      spiffe.io/env: "demo"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend Service ───────────────────────────────────────────────
  backend:
    build:
      context: ./apps
      dockerfile: backend/Dockerfile
    hostname: backend
    pid: "host"
    environment:
      SPIFFE_ENDPOINT_SOCKET: "unix:///run/spire/sockets/agent.sock"
      TRUST_DOMAIN: "example.org"
      SERVICE_NAME: "backend"
    volumes:
      - spire-sockets:/run/spire/sockets:ro
    networks:
      - spiffe-net
    depends_on:
      spire-agent:
        condition: service_healthy
    labels:
      spiffe.io/service: "backend"
      spiffe.io/env: "demo"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8444/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
