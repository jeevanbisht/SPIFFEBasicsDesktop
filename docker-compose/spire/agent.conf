agent {
    data_dir       = "/opt/spire/data/agent"
    log_level      = "INFO"
    trust_domain   = "example.org"
    server_address     = "spire-server"
    server_port        = "8081"
    socket_path        = "/run/spire/sockets/agent.sock"
    insecure_bootstrap = true
}

plugins {
    # Node attestation: join_token (simple for Docker/standalone)
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    # Workload attestation: identify containers by Docker labels
    WorkloadAttestor "docker" {
        plugin_data {
            docker_socket_path = "unix:///var/run/docker.sock"
        }
    }

    # Also support unix socket metadata (uid/gid/pid)
    WorkloadAttestor "unix" {
        plugin_data {}
    }
}

health_checks {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = "8080"
    live_path        = "/live"
    ready_path       = "/ready"
}
