server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    socket_path  = "/tmp/spire-server/private/api.sock"
    trust_domain = "example.org"
    data_dir     = "/opt/spire/data"
    log_level    = "INFO"

    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl  = "5m"

    ca_key_type = "ec-p256"
    ca_subject {
        country      = ["US"]
        organization = ["SPIFFE Standalone Tutorial"]
        common_name  = ""
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/datastore.sqlite3"
        }
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/keys.json"
        }
    }

    # For Docker/standalone: use join_token node attestation
    # (For Kubernetes use k8s_psat — see kind/ track)
    NodeAttestor "join_token" {
        plugin_data {}
    }
}

health_checks {
    listener_enabled = true
    bind_address     = "0.0.0.0"
    bind_port        = "8080"
    live_path        = "/live"
    ready_path       = "/ready"
}
