apiVersion: v1
kind: Pod
metadata:
  name: test-workload
  namespace: default
  labels:
    app: test-workload
    # The workload attestor uses these labels to match registration entries
    spiffe.io/spiffe-id: "true"
spec:
  containers:
    - name: test-workload
      image: ghcr.io/spiffe/spire-agent:1.9.6
      command: ["sleep", "86400"]
      env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///run/spire/sockets/agent.sock"
      volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
  volumes:
    - name: spire-agent-socket
      hostPath:
        path: /run/spire/sockets
        type: Directory
