apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server
  namespace: spire
data:
  server.conf: |
    server {
      bind_address     = "0.0.0.0"
      bind_port        = "8081"
      socket_path      = "/tmp/spire-server/private/api.sock"
      trust_domain     = "cluster-b.example.org"
      data_dir         = "/run/spire/data"
      log_level        = "INFO"
      default_x509_svid_ttl = "1h"
      default_jwt_svid_ttl  = "5m"
      federation {
        bundle_endpoint {
          address = "0.0.0.0"
          port    = 8443
        }
      }
    }
    plugins {
      DataStore "sql" {
        plugin_data {
          database_type     = "sqlite3"
          connection_string = "/run/spire/data/datastore.sqlite3"
        }
      }
      KeyManager "disk" {
        plugin_data {
          keys_path = "/run/spire/data/keys.json"
        }
      }
      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "cluster-b" = {
              service_account_allow_list = ["spire:spire-agent"]
            }
          }
        }
      }
      Notifier "k8sbundle" {
        plugin_data { namespace = "spire" }
      }
    }
    health_checks {
      listener_enabled = true
      bind_address     = "0.0.0.0"
      bind_port        = "8080"
      live_path        = "/live"
      ready_path       = "/ready"
    }
