apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-frontend-config
  namespace: demo
data:
  envoy.yaml: |
    node:
      id: frontend
      cluster: demo

    static_resources:
      listeners:
        # Intercept outbound HTTP and upgrade to mTLS
        - name: outbound_to_backend
          address:
            socket_address:
              address: 127.0.0.1
              port_value: 9000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: outbound_backend
                    route_config:
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match: {prefix: "/"}
                              route:
                                cluster: backend_mtls
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        # SDS cluster — Envoy talks to SPIRE Agent to get SVIDs
        - name: spire_agent
          connect_timeout: 1s
          type: STATIC
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: spire_agent
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        pipe:
                          path: /run/spire/sockets/agent.sock

        # Backend cluster — mTLS using SPIFFE SVIDs
        - name: backend_mtls
          connect_timeout: 5s
          type: STRICT_DNS
          load_assignment:
            cluster_name: backend_mtls
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: backend-envoy
                          port_value: 9000
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              combined_validation_context:
                default_validation_context:
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher:
                        exact: "spiffe://example.org/ns/demo/sa/backend"
                validation_context_sds_secret_config:
                  name: "spiffe://example.org"
                  sds_config:
                    api_config_source:
                      api_type: GRPC
                      transport_api_version: V3
                      grpc_services:
                        - envoy_grpc:
                            cluster_name: spire_agent
              tls_certificate_sds_secret_configs:
                - name: "spiffe://example.org/ns/demo/sa/frontend"
                  sds_config:
                    api_config_source:
                      api_type: GRPC
                      transport_api_version: V3
                      grpc_services:
                        - envoy_grpc:
                            cluster_name: spire_agent

    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-backend-config
  namespace: demo
data:
  envoy.yaml: |
    node:
      id: backend
      cluster: demo

    static_resources:
      listeners:
        - name: inbound_mtls
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9000
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  require_client_certificate: true
                  combined_validation_context:
                    default_validation_context:
                      match_typed_subject_alt_names:
                        - san_type: URI
                          matcher:
                            exact: "spiffe://example.org/ns/demo/sa/frontend"
                    validation_context_sds_secret_config:
                      name: "spiffe://example.org"
                      sds_config:
                        api_config_source:
                          api_type: GRPC
                          transport_api_version: V3
                          grpc_services:
                            - envoy_grpc:
                                cluster_name: spire_agent
                  tls_certificate_sds_secret_configs:
                    - name: "spiffe://example.org/ns/demo/sa/backend"
                      sds_config:
                        api_config_source:
                          api_type: GRPC
                          transport_api_version: V3
                          grpc_services:
                            - envoy_grpc:
                                cluster_name: spire_agent
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: inbound_backend
                    route_config:
                      virtual_hosts:
                        - name: local_app
                          domains: ["*"]
                          routes:
                            - match: {prefix: "/"}
                              route:
                                cluster: local_app
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: spire_agent
          connect_timeout: 1s
          type: STATIC
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: spire_agent
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        pipe:
                          path: /run/spire/sockets/agent.sock

        - name: local_app
          connect_timeout: 1s
          type: STATIC
          load_assignment:
            cluster_name: local_app
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 8080

    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9902
