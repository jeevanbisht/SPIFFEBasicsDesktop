# ServiceAccounts
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: demo
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-envoy
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-envoy
  template:
    metadata:
      labels:
        app: frontend-envoy
    spec:
      serviceAccountName: frontend
      containers:
        # App container — talks plain HTTP to Envoy on localhost:9000
        - name: app
          image: curlimages/curl:latest
          command: ["sh", "-c", "while true; do sleep 30; done"]

        # Envoy sidecar — handles mTLS using SPIFFE SVIDs
        - name: envoy
          image: envoyproxy/envoy:v1.29-latest
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-frontend-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-envoy
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-envoy
  template:
    metadata:
      labels:
        app: backend-envoy
    spec:
      serviceAccountName: backend
      containers:
        # App container — simple HTTP server, no TLS
        - name: app
          image: hashicorp/http-echo:latest
          args:
            - '-text={"message": "Hello from backend!", "note": "App speaks plain HTTP — Envoy handles mTLS"}'
            - "-listen=:8080"

        # Envoy sidecar — accepts mTLS, forwards to app on localhost:8080
        - name: envoy
          image: envoyproxy/envoy:v1.29-latest
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - containerPort: 9000
              name: envoy-mtls
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-backend-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
---
# Services
apiVersion: v1
kind: Service
metadata:
  name: frontend-envoy
  namespace: demo
spec:
  selector:
    app: frontend-envoy
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-envoy
  namespace: demo
spec:
  selector:
    app: backend-envoy
  ports:
    - port: 9000
      targetPort: 9000
